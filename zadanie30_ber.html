<html>
<head>
<script type="text/javascript">
    var Ciezarowka = {
        marka: 'Volvo',
        ladownosc: '24 tony',
        paliwo: 'diesel',
        ciezarowka_pokaz_berdys: function (){
            document.write(
                "Marka: " + this.marka + "<br>" +
                "Ładowność: " + this.ladownosc + "<br>" +
                "Paliwo: " + this.paliwo
            );
        }
    }

    Ciezarowka.ciezarowka_pokaz_berdys();
</script>
</head>
<body>
<br>
Programowanie obiektowe – ciężarówka
</body>
</html>
